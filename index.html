<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="AKI暗記" />
<meta name="theme-color" content="#11151c" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>AKI暗記</title>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    addEventListener('load', function () { navigator.serviceWorker.register('./sw.js'); });
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── base / layout ─────────────────────────────── */
* { -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; overflow: hidden; overscroll-behavior: none; }
body {
  background: oklch(0.165 0.018 248);
  font-family: 'Noto Sans JP', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', sans-serif;
}
/* 全画面を確実に覆う。standalone(viewport-fit=cover)では画面下のセーフエリア
   (ホームバー領域)まで含めて画面いっぱいになり、タブバーの下に余白が出ない。
   position:fixed + inset:0 は dvh/vh/innerHeight の実装差に影響されない。 */
#root { position: fixed; inset: 0; }
@media (min-width: 481px) {
  #root { display: flex; align-items: stretch; justify-content: center; }
}

/* ── theme tokens (Cockpit) ───────────────────── */
.aki-app {
  --bg: oklch(0.165 0.018 248);
  --surface: oklch(0.215 0.020 248);
  --surface-2: oklch(0.265 0.022 248);
  --line: oklch(0.310 0.018 248);
  --text: oklch(0.965 0.006 248);
  --text-dim: oklch(0.740 0.014 248);
  --text-mute: oklch(0.560 0.014 248);
  --accent: oklch(0.745 0.115 232);
  --accent-ink: oklch(0.160 0.030 248);
  --good: oklch(0.760 0.130 158);
  --hard: oklch(0.815 0.115 78);
  --again: oklch(0.705 0.150 25);
  max-width: 480px;
  margin-inline: auto;
  width: 100%;
}
.aki-app.theme-light {
  --bg: oklch(0.965 0.008 248);
  --surface: oklch(0.998 0.002 248);
  --surface-2: oklch(0.945 0.010 248);
  --line: oklch(0.890 0.014 248);
  --text: oklch(0.250 0.020 248);
  --text-dim: oklch(0.430 0.018 248);
  --text-mute: oklch(0.560 0.016 248);
  --accent: oklch(0.560 0.130 232);
  --accent-ink: oklch(0.995 0.004 248);
  --good: oklch(0.540 0.120 158);
  --hard: oklch(0.560 0.110 78);
  --again: oklch(0.560 0.180 25);
}

/* header safe-area + production-specific */
.aki-app .aki-header { padding: calc(env(safe-area-inset-top, 16px) + 14px) 22px 14px; }
.aki-toast {
  position: absolute; left: 50%; transform: translateX(-50%);
  bottom: calc(env(safe-area-inset-bottom, 0px) + 96px); z-index: 30;
  background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
  padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
  box-shadow: 0 12px 34px rgba(0,0,0,.4); transition: opacity .35s; pointer-events: none;
}
.aki-prov-select {
  font-family: inherit; font-size: 13px; color: var(--text); background: var(--bg);
  border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; max-width: 160px;
}
.aki-prov-select:focus { outline: none; border-color: var(--accent); }
.aki-ai-result { white-space: pre-wrap; }

/* ═══════════════════════════════════════════════════════════
   aki.css — embedded verbatim (design source of truth)
   ═══════════════════════════════════════════════════════════ */
.aki-app *, .aki-app *::before, .aki-app *::after { box-sizing: border-box; }

.aki-app {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.01em;
}
.aki-mono { font-family: 'DM Mono', ui-monospace, SFMono-Regular, monospace; }

/* ── header ───────────────────────────────────── */
.aki-header {
  flex-shrink: 0;
  padding: 58px 22px 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}
.aki-brand { display: flex; flex-direction: column; gap: 2px; }
.aki-brand-kicker {
  font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); font-weight: 500;
}
.aki-brand-name { font-size: 23px; font-weight: 700; line-height: 1; letter-spacing: 0.02em; }
.aki-icon-btn {
  width: 40px; height: 40px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface); color: var(--text-dim);
  border: 1px solid var(--line); cursor: pointer;
  transition: background .15s, color .15s;
}
.aki-icon-btn:active { background: var(--surface-2); color: var(--text); }

/* ── screen scroll region ─────────────────────── */
.aki-screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; animation: akiScreenIn .26s ease both; }
@keyframes akiScreenIn {
  from { opacity: 0; transform: translateY(7px); }
  to { opacity: 1; transform: none; }
}
.aki-screen::-webkit-scrollbar { width: 0; }
.aki-pad { padding: 4px 22px 120px; }

/* ── tab bar ──────────────────────────────────── */
.aki-tabbar {
  flex-shrink: 0;
  position: absolute; left: 0; right: 0; bottom: 0;
  /* 下端: ホームインジケーターのセーフエリアを確保しつつ余白を抑える。
     セーフエリア非対応端末(SE/PC)では floor 14px。
     iPhone 16系(inset≈34px)では 34+6=40px ≒ 旧64pxから約24px縮小。 */
  padding: 10px 14px max(calc(env(safe-area-inset-bottom, 0px) + 6px), 14px);
  display: flex; gap: 4px;
  background: color-mix(in oklab, var(--bg) 72%, transparent);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-top: 1px solid var(--line);
}
.aki-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 7px 0 5px; border-radius: 14px; cursor: pointer;
  color: var(--text-mute); background: none; border: none;
  transition: color .15s;
}
.aki-tab span { font-size: 10.5px; font-weight: 500; letter-spacing: .04em; }
.aki-tab.is-active { color: var(--accent); }
.aki-tab.is-active svg { animation: akiTabPop .32s cubic-bezier(.3,1.4,.5,1); }
@keyframes akiTabPop {
  0% { transform: scale(.85); }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ── generic bits ─────────────────────────────── */
.aki-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px; border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--line); color: var(--text-dim);
}
.aki-chip.is-on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.aki-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 20px; padding: 18px;
}
.aki-section-label {
  font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--text-mute); font-weight: 600; margin: 22px 2px 11px;
}
.aki-section-label:first-child { margin-top: 6px; }

/* ── STUDY ────────────────────────────────────── */
.aki-study-top {
  display: flex; align-items: center; justify-content: space-between;
  margin: 2px 2px 16px;
}
.aki-due-count { font-size: 13px; color: var(--text-dim); }
.aki-due-count b { color: var(--text); font-weight: 700; font-size: 15px; }
.aki-top-controls { display: flex; align-items: center; gap: 8px; }
.aki-order-btn {
  width: 34px; height: 34px; border-radius: 11px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  background: var(--surface); border: 1px solid var(--line); color: var(--text-mute);
  transition: background .15s, color .15s, border-color .15s;
}
.aki-order-btn.is-on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.aki-mode-toggle {
  display: flex; padding: 3px; gap: 3px; border-radius: 11px;
  background: var(--surface); border: 1px solid var(--line);
}
.aki-mode-toggle button {
  border: none; background: none; cursor: pointer;
  font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 8px;
  color: var(--text-mute); font-family: inherit;
}
.aki-mode-toggle button.is-on { background: var(--surface-2); color: var(--text); }

/* progress dots above card */
.aki-progress-track { display: flex; gap: 5px; margin: 0 2px 16px; }
.aki-progress-track i {
  flex: 1; height: 3px; border-radius: 2px; background: var(--line);
  transition: background .45s ease;
}
.aki-progress-track i.done { background: var(--accent); }
.aki-progress-track i.now { background: var(--text-dim); }

/* ── deck (山札) ── */
/* 高さは画面高に追従。iPhone 14/15 以上(画面高>=752px相当)では上限の 408px。
   iPhone SE / mini など低い画面では縮め、評価ボタンを折り返さず収める。
   定義本文はカード内 (.aki-back-body) が内部スクロールするので可読性は保たれる。 */
.aki-deck { position: relative; height: 408px; height: clamp(280px, calc(100dvh - 344px), 408px); }
.aki-deck-ghost {
  position: absolute; inset: 0; border-radius: 26px;
  background: var(--surface); border: 1px solid var(--line);
  transition: transform .38s cubic-bezier(.3,.9,.3,1), opacity .38s ease;
}
.aki-deck-ghost.g1 { transform: translateY(13px) scale(.952); opacity: .8; }
.aki-deck-ghost.g2 { transform: translateY(25px) scale(.906); opacity: .45; }
.aki-deck.is-promoting .aki-deck-ghost.g1 { transform: translateY(0) scale(1); opacity: 1; }
.aki-deck.is-promoting .aki-deck-ghost.g2 { transform: translateY(13px) scale(.952); opacity: .8; }

/* card turn (scaleX swap — robust inside the canvas's scaled context) */
.aki-turn {
  position: relative; z-index: 2; height: 100%;
  transform-origin: center;
  transition: transform .16s ease-in-out, filter .16s ease-in-out;
  will-change: transform;
  animation: akiCardIn .34s cubic-bezier(.3,.9,.3,1) both;
}
.aki-turn.is-turning { transform: scaleX(0.02); filter: brightness(.82); }
@keyframes akiCardIn {
  from { transform: translateY(13px) scale(.952); }
  to { transform: none; }
}
/* directional exits */
.aki-turn.exit-good { animation: akiExitGood .38s cubic-bezier(.5,0,.8,.4) both; }
.aki-turn.exit-hard { animation: akiExitHard .34s ease both; }
.aki-turn.exit-again { animation: akiExitAgain .38s cubic-bezier(.5,0,.8,.4) both; }
@keyframes akiExitGood {
  to { transform: translateY(-72px) rotate(-2.5deg) scale(.96); opacity: 0; }
}
@keyframes akiExitHard {
  to { transform: scale(.95); opacity: 0; }
}
@keyframes akiExitAgain {
  to { transform: translateY(64px) rotate(2.5deg) scale(.96); opacity: 0; }
}
.aki-face {
  border-radius: 26px; border: 1px solid var(--line);
  background: var(--surface);
  display: flex; flex-direction: column;
}

/* front */
.aki-front-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 40px 26px;
}
.aki-front-cat { margin-bottom: 22px; }
.aki-term {
  font-size: 46px; font-weight: 700; letter-spacing: .02em; line-height: 1.05;
}
.aki-reading { margin-top: 12px; font-size: 14px; color: var(--text-mute); letter-spacing: .12em; }
.aki-level-dots { display: flex; gap: 5px; margin-top: 26px; }
.aki-level-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--line); }
.aki-level-dots i.on { background: var(--accent); }
.aki-front-hint {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 16px; border-top: 1px solid var(--line);
  color: var(--text-mute); font-size: 12.5px; font-weight: 500;
}

/* back (definition — the star) */
.aki-back-body { flex: 1; padding: 26px 24px; overflow-y: auto; }
.aki-back-body::-webkit-scrollbar { width: 0; }
.aki-back-head {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px;
  padding-bottom: 14px; border-bottom: 1px solid var(--line);
}
.aki-back-term { font-size: 22px; font-weight: 700; letter-spacing: .02em; }
.aki-back-reading { font-size: 11px; color: var(--text-mute); letter-spacing: .1em; }
.aki-def {
  font-size: 19px; line-height: 1.85; font-weight: 500;
  letter-spacing: .015em; text-wrap: pretty; color: var(--text);
}
.aki-note {
  margin-top: 18px; padding: 14px 15px; border-radius: 14px;
  background: var(--bg); border: 1px solid var(--line);
  font-size: 13.5px; line-height: 1.7; color: var(--text-dim);
}
.aki-note .lbl { color: var(--accent); font-weight: 600; font-size: 11px; letter-spacing: .12em; display: block; margin-bottom: 5px; }
.aki-kw { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }

/* highlight (input mode missed) */
.aki-hl {
  background: color-mix(in oklab, var(--again) 26%, transparent);
  border-bottom: 2px solid var(--again);
  border-radius: 3px; padding: 0 1px; color: inherit;
}

/* rating buttons */
.aki-rate { display: flex; gap: 9px; margin-top: 16px; }
.aki-rate button {
  flex: 1; min-height: 60px; border-radius: 17px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  border: 1px solid var(--line); background: var(--surface);
  font-family: inherit; color: var(--text); transition: transform .1s;
  animation: akiRateIn .34s cubic-bezier(.3,.9,.3,1) both;
}
.aki-rate button:nth-child(1) { animation-delay: 0s; }
.aki-rate button:nth-child(2) { animation-delay: .05s; }
.aki-rate button:nth-child(3) { animation-delay: .1s; }
@keyframes akiRateIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
.aki-rate button:active { transform: scale(.96); }
.aki-rate button .em { font-size: 15px; font-weight: 700; }
.aki-rate button .sub { font-size: 10.5px; color: var(--text-mute); }
.aki-rate .good { border-color: color-mix(in oklab, var(--good) 45%, var(--line)); }
.aki-rate .good .em { color: var(--good); }
.aki-rate .hard { border-color: color-mix(in oklab, var(--hard) 45%, var(--line)); }
.aki-rate .hard .em { color: var(--hard); }
.aki-rate .again { border-color: color-mix(in oklab, var(--again) 45%, var(--line)); }
.aki-rate .again .em { color: var(--again); }

/* input mode */
.aki-answer {
  width: 100%; min-height: 120px; resize: none; margin-top: 14px;
  border-radius: 18px; border: 1px solid var(--line); background: var(--surface);
  color: var(--text); font-family: inherit; font-size: 16px; line-height: 1.7;
  padding: 16px 16px 44px; letter-spacing: .015em;
}
.aki-answer:focus { outline: none; border-color: var(--accent); }
.aki-answer::placeholder { color: var(--text-mute); }
.aki-answer-wrap { position: relative; }
.aki-mic-hint {
  position: absolute; right: 14px; bottom: 12px;
  display: flex; align-items: center; gap: 5px;
  font-size: 10.5px; color: var(--text-mute);
}
.aki-primary {
  width: 100%; margin-top: 12px; min-height: 52px; border-radius: 16px;
  background: var(--accent); color: var(--accent-ink); border: none; cursor: pointer;
  font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: .03em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.aki-primary:active { filter: brightness(.94); }
.aki-primary:disabled { filter: brightness(.8); cursor: default; }
.aki-ghost {
  width: 100%; margin-top: 10px; min-height: 48px; border-radius: 14px;
  background: var(--surface); color: var(--text-dim); border: 1px solid var(--line);
  cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
}

/* empty state */
.aki-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 70px 30px; gap: 14px;
}
.aki-empty-badge {
  width: 76px; height: 76px; border-radius: 24px; display: flex;
  align-items: center; justify-content: center; position: relative;
  background: var(--surface); border: 1px solid var(--line); color: var(--accent);
}
.aki-badge-ring {
  position: absolute; inset: -1px; border-radius: 24px;
  border: 1px solid var(--accent); opacity: 0;
  animation: akiRingPulse 1.1s ease .45s;
}
@keyframes akiRingPulse {
  0% { opacity: .8; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.45); }
}
.aki-celebrate .aki-empty-badge { animation: akiBadgePop .55s cubic-bezier(.3,1.5,.4,1) both; }
.aki-celebrate h3 { animation: akiFade .4s ease .18s both; }
.aki-celebrate p { animation: akiFade .4s ease .28s both; }
.aki-celebrate .aki-ghost { animation: akiFade .4s ease .4s both; }
@keyframes akiBadgePop {
  0% { opacity: 0; transform: scale(.55) rotate(-6deg); }
  100% { opacity: 1; transform: scale(1) rotate(0); }
}
.aki-empty h3 { font-size: 19px; font-weight: 700; }
.aki-empty p { font-size: 13.5px; line-height: 1.7; color: var(--text-dim); max-width: 240px; }

/* ── LIST ─────────────────────────────────────── */
.aki-searchbar {
  display: flex; align-items: center; gap: 9px; padding: 11px 14px;
  border-radius: 14px; background: var(--surface); border: 1px solid var(--line);
  color: var(--text-mute); margin-bottom: 12px;
}
.aki-searchbar input {
  flex: 1; background: none; border: none; outline: none;
  /* 16px 未満は iOS Safari がフォーカス時に自動ズームするため不可 */
  font-family: inherit; font-size: 16px; color: var(--text);
}
.aki-searchbar input::placeholder { color: var(--text-mute); }
.aki-filter-row { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 6px; }
.aki-filter-row::-webkit-scrollbar { height: 0; }
.aki-filter-row .aki-chip { flex-shrink: 0; cursor: pointer; }
.aki-sort {
  display: flex; align-items: center; justify-content: space-between;
  margin: 14px 2px 8px; font-size: 12px; color: var(--text-mute);
}
.aki-sort b { color: var(--text-dim); font-weight: 600; }
.aki-term-row {
  display: flex; align-items: center; gap: 14px; padding: 15px 4px;
  border-bottom: 1px solid var(--line); cursor: pointer;
}
.aki-term-row:active { background: var(--surface); }
.aki-tr-main { flex: 1; min-width: 0; }
.aki-tr-term { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
.aki-tr-def {
  font-size: 12.5px; color: var(--text-dim); line-height: 1.55; margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.aki-tr-meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
.aki-level-bar { display: flex; gap: 3px; }
.aki-level-bar i { width: 14px; height: 4px; border-radius: 2px; background: var(--line); }
.aki-level-bar i.on { background: var(--accent); }

/* ── ADD form ─────────────────────────────────── */
.aki-field { margin-bottom: 18px; }
.aki-field label {
  display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600;
  color: var(--text-dim); margin-bottom: 7px;
}
.aki-field label .req { color: var(--accent); font-size: 10px; }
.aki-field label .opt { color: var(--text-mute); font-weight: 500; font-size: 11px; }
.aki-input, .aki-textarea {
  width: 100%; border-radius: 14px; border: 1px solid var(--line);
  background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 16px; padding: 13px 15px; letter-spacing: .015em;
}
.aki-textarea { min-height: 110px; resize: none; line-height: 1.7; }
.aki-input:focus, .aki-textarea:focus { outline: none; border-color: var(--accent); }
.aki-input::placeholder, .aki-textarea::placeholder { color: var(--text-mute); }
.aki-suggest { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
.aki-suggest .aki-chip { cursor: pointer; }
.aki-field-hint { font-size: 11.5px; color: var(--text-mute); margin-top: 7px; line-height: 1.55; }

/* ── PROGRESS ─────────────────────────────────── */
.aki-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-bottom: 6px; }
.aki-stat {
  background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
  padding: 16px; display: flex; flex-direction: column; gap: 3px;
}
.aki-stat .num { font-size: 30px; font-weight: 700; letter-spacing: -.01em; line-height: 1; }
.aki-stat .num small { font-size: 15px; font-weight: 600; color: var(--text-mute); margin-left: 2px; }
.aki-stat .cap { font-size: 11.5px; color: var(--text-mute); font-weight: 500; }

}

/* ───────────────────────── highlight (§7) ───────────────────────── */
function highlightKeywords(def, missed) {
  var frag = document.createDocumentFragment();
  if (!missed.length) { frag.appendChild(document.createTextNode(def)); return frag; }
  var rest = def;
  while (rest.length) {
    var hitAt = -1, hitWord = null;
    for (var i = 0; i < missed.length; i++) { var idx = rest.indexOf(missed[i]); if (idx !== -1 && (hitAt === -1 || idx < hitAt)) { hitAt = idx; hitWord = missed[i]; } }
    if (hitAt === -1) { frag.appendChild(document.createTextNode(rest)); break; }
    if (hitAt > 0) frag.appendChild(document.createTextNode(rest.slice(0, hitAt)));
    var mk = document.createElement('mark'); mk.className = 'aki-hl'; mk.textContent = hitWord; frag.appendChild(mk);
    rest = rest.slice(hitAt + hitWord.length);
  }
  return frag;
}
function lcsMissedHTML(answer, def) {
  var a = answer || '', b = def, n = a.length, m = b.length;
  var frag = document.createDocumentFragment();
  if (!n) { var mk0 = document.createElement('mark'); mk0.className = 'aki-hl'; mk0.textContent = b; frag.appendChild(mk0); return frag; }
  var prev = new Array(m + 1).fill(0), cur;
  var keep = [];
  for (var i = 1; i <= n; i++) {
    cur = new Array(m + 1).fill(0);
    for (var j = 1; j <= m; j++) cur[j] = a[i - 1] === b[j - 1] ? prev[j - 1] + 1 : Math.max(prev[j], cur[j - 1]);
    keep.push(cur); prev = cur;
  }
  // backtrack
  var matched = new Array(m).fill(false);
  var ii = n, jj = m;
  while (ii > 0 && jj > 0) {
    if (a[ii - 1] === b[jj - 1]) { matched[jj - 1] = true; ii--; jj--; }
    else if (keep[ii - 2 >= 0 ? ii - 2 : 0] && (ii > 1 ? keep[ii - 2][jj] : 0) >= cur[jj - 1]) { ii--; }
    else { jj--; }
  }
  // simpler/robust backtrack using full table
  matched = backtrackLCS(a, b);
  var run = '', runMiss = null;
  function flush() {
    if (!run) return;
    if (runMiss) { var mk = document.createElement('mark'); mk.className = 'aki-hl'; mk.textContent = run; frag.appendChild(mk); }
    else frag.appendChild(document.createTextNode(run));
    run = '';
  }
  for (var k = 0; k < m; k++) {
    var miss = !matched[k];
    if (runMiss === null) runMiss = miss;
    if (miss !== runMiss) { flush(); runMiss = miss; }
    run += b[k];
  }
  flush();
  return frag;
}
function backtrackLCS(a, b) {
  var n = a.length, m = b.length;
  var dp = [];
  for (var i = 0; i <= n; i++) dp.push(new Array(m + 1).fill(0));
  for (i = 1; i <= n; i++) for (var j = 1; j <= m; j++) dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
  var matched = new Array(m).fill(false);
  i = n; j = m;
  while (i > 0 && j > 0) {
    if (a[i - 1] === b[j - 1]) { matched[j - 1] = true; i--; j--; }
    else if (dp[i - 1][j] >= dp[i][j - 1]) i--;
    else j--;
  }

}

        if (S.terms.length) showModal('サンプル用語を入れますか？', '現在の用語と学習記録が、航空運航サンプル8語で置き換えられます。元に戻せません。', '入れ替える', go); else go();
      } },
        h('div', { class: 'aki-set-main' }, h('div', { class: 't' }, 'サンプル用語を入れる'), h('div', { class: 'd' }, '航空運航支援の用語8語でお試し（既存データは置換）')), h('span', { class: 'aki-set-val' }, '›')),
      h('button', { class: 'aki-set-row aki-set-btn', onClick: function () {
        showModal('全データを削除しますか？', 'すべての用語と学習記録が削除されます。元に戻せません。バックアップをおすすめします。', '削除する', function () { S.clearAll(); flash('ok', '全データを削除しました'); });
      } },
        h('div', { class: 'aki-set-main' }, h('div', { class: 't', style: { color: 'var(--again)' } }, '全データを削除'), h('div', { class: 'd' }, '用語と学習記録をすべて消去')), h('span', { class: 'aki-set-val' }, '›'))));

    pad.appendChild(h('div', { class: 'aki-set-foot aki-mono' }, 'term-memo-app · localStorage · v1'));
  }
  render();
  return screen;
}

/* ───────────────────────── theme ───────────────────────── */
function effectiveTheme() {
  var pref = S.settings.theme || 'dark';
  if (pref === 'system') return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  return pref;
}
function applyTheme() {
  var eff = effectiveTheme();
  app.classList.toggle('theme-light', eff === 'light');
  var bg = eff === 'light' ? 'oklch(0.965 0.008 248)' : 'oklch(0.150 0.018 248)';
  document.body.style.background = bg;
  var m = document.querySelector('meta[name=theme-color]'); if (m) m.setAttribute('content', eff === 'light' ? '#eef1f5' : '#11151c');
}

/* ───────────────────────── init ───────────────────────── */
function init() {
  S.load();
  S.initSession();
  buildShell();
  applyTheme();
  if (window.matchMedia) {
    var mq = window.matchMedia('(prefers-color-scheme: light)');
    var onChange = function () { if ((S.settings.theme || 'dark') === 'system') applyTheme(); };
    if (mq.addEventListener) mq.addEventListener('change', onChange); else if (mq.addListener) mq.addListener(onChange);
  }
  setTab('study');
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
